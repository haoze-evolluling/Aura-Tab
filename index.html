<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Tab - 新标签页</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/glassmorphism.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-container">
        <div class="gradient-bg"></div>
    </div>

    <main class="main-container">
        <!-- 时钟组件 -->
        <section class="clock-section">
            <div class="glass-card clock-card">
                <div class="clock-display" id="clockDisplay">
                    <div class="time" id="timeDisplay">00:00:00</div>
                    <div class="date" id="dateDisplay">2024年1月1日 星期一</div>
                </div>
            </div>
        </section>

        <!-- 搜索组件 -->
        <section class="search-section">
            <div class="glass-card search-card">
                <div class="search-container">
                    <div class="search-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </div>
                    <input type="text" class="search-input" id="searchInput" placeholder="搜索或输入网址...">
                    <div class="search-suggestions" id="searchSuggestions"></div>
                </div>
            </div>
        </section>

        <!-- 快捷访问组件 -->
        <section class="quick-access-section">
            <div class="glass-card quick-access-card">
                <h3 class="section-title">快捷访问</h3>
                <div class="quick-access-grid" id="quickAccessGrid">
                    <!-- 快捷访问按钮将通过JavaScript动态生成 -->
                </div>
                <button class="add-shortcut-btn" id="addShortcutBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    添加快捷方式
                </button>
            </div>
        </section>
    </main>

    <!-- 添加快捷方式模态框 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="glass-card modal-card">
            <h3>添加快捷方式</h3>
            <form class="shortcut-form" id="shortcutForm">
                <div class="form-group">
                    <label for="shortcutName">网站名称</label>
                    <input type="text" id="shortcutName" placeholder="例如：Google" required>
                </div>
                <div class="form-group">
                    <label for="shortcutUrl">网站地址</label>
                    <input type="url" id="shortcutUrl" placeholder="https://www.google.com" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
                    <button type="submit" class="btn btn-primary">添加</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/clock.js"></script>
    <script src="js/search.js"></script>
    <script src="js/quickAccess.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
